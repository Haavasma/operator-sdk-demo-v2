apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: presentations
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Haavasma/operator-sdk-demo-v2.git
    path: presentations
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: demos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
