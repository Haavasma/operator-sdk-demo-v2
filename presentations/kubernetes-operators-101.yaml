apiVersion: presentations.haavard.dev/v1alpha1
kind: Presentation
metadata:
  name: kubernetes-operators-101
spec:
  theme:
    primaryColor: "#FFFFFF"
    secondaryColor: "#FFFFFF"
    backgroundColor: "#000000"
    fontFamily: "'Neue Haas Grotesk Pro', 'Neue Haas Grotesk', sans-serif"
    logo: "https://pickitmedialive.blob.core.windows.net/34ce-softwareone-thumbnails/VpPa1s7n?sv=2025-11-05&st=2026-04-24T10%3A55%3A57Z&se=2026-04-24T16%3A55%3A57Z&sr=b&sp=r&sig=uEGCuwZ1%2FAZV3L48%2BtyXIxWCK%2F66AKEg%2BeoX5tipME8%3D&rscd=attachment%3B%20filename%3D%22large%22%3B%20filename*%3DUTF-8%27%27large"
  slides:
    - title: "Operator-sdk: Why and how to make custom resources"
    - title: "The problem"
      bullets:
        - "Running software in production = repetitive operational work"
        - "Provisioning, upgrades, failover, backups, scaling"
        - "Operational knowledge lives in runbooks, wikis, people's heads"
        - "Manual steps drift, break, and don't scale with team or fleet"
        - "How do we encode operations as code?"
    - title: "Step 1: Kubernetes"
      bullets:
        - "Declarative orchestrator for containerized workloads"
        - "Desired state in YAML, controllers reconcile toward it"
        - "Built-in primitives: Deployment, Service, Ingress, ConfigMap..."
        - "Self-healing control loops handle drift and failure"
        - "Solves generic workload ops — not domain-specific ops"
    - title: "Step 2: GitOps"
      bullets:
        - "Git as single source of truth for cluster state"
        - "ArgoCD / Flux continuously sync repo → cluster"
        - "Auditable, reviewable, reproducible deployments"
        - "But: only as expressive as the resources you apply"
        - "Complex apps still need glue scripts, Helm hacks, manual steps"
    - title: "Step 3: Custom Resources"
      bullets:
        - "Extend the Kubernetes API with your own resource types"
        - "Domain-specific abstractions: Database, Presentation, Pipeline"
        - "Users write high-level specs, not low-level plumbing"
        - "GitOps still works — now over *your* abstractions"
        - "Needs a controller to give the CRD meaning"
    - title: "Step 4: Operator SDK"
      bullets:
        - "Framework for building the controller behind a CRD"
        - "Encodes operational knowledge as a reconciliation loop"
        - "Turn runbooks into code that runs 24/7"
        - "Problem → solved: ops is now declarative, versioned, automated"
    - title: ""
      images:
        - url: "https://cdn.prod.website-files.com/5ff66329429d880392f6cba2/673f4107a915916cd43fbdf8_646786e5646162c532696293_661.2.jpeg"
    - title: "Operator pattern"
      images:
        - url: "https://iximiuz.com/kubernetes-operator-pattern/kube-control-loop-3000-opt.png"
    - title: "Custom resource definition (CRDs)"
      bullets:
        - "Tells Kubernetes API what the resource looks like"
        - "Comparable to a class/model definition"
    - title: ""
      images:
        - url: "https://i.imgur.com/ivI59ny.png"
    - title: "Custom Resources"
      bullets:
        - "An instance of the CRD"
        - "Comparable to a an object created of the class/CRD"
        - "Controller/operator reacts to a custom resource"
    - title: ""
      images:
        - url: "https://i.imgur.com/frcjcUS.png"
    - title: "Why create custom resources?"
      bullets:
        - "Automation of operational knowledge"
        - "Native Kubernetes experience"
        - "Reduce operational overhead"
        - "Domain-specific abstractions"
        - "Use cases: provisioning databases, Message que"
    - title: "Use cases?"
      bullets:
        - "Provisining databases"
        - "Provisioning message queues"
        - "Abstracting complexity"
        - "Managing external resources"
        - "Generally when native kube resources become too complicated"
    - title: "Operator SDK"
      bullets:
        - "Tooling/framework for developing operators"
        - "Possible to create with helm, kustomize and golang"
    - title: "Operator SDK - golang"
      bullets:
        - "CLI for handling boilerplate"
        - "Define the CRD through golang types"
        - "Write the reconciliation loop"
        - "Auto-generate manifests"
    - title: "Why Operator SDK?"
      bullets:
        - "Standardized way to build Kubernetes operators"
        - "Takes care of boilerplate code"
        - "freedom to implement logic and integrate any tooling/system"
        - "Kubernetes is written in golang"
        - "strong typing for all resources instead of relying on yaml"
        - "DRY"
    - title: "Why Operator SDK? (cont.)"
      bullets:
        - "Performant"
        - "Ecosystem"
        - "All benefits of the go programming language"
    - title: "DEMO"
