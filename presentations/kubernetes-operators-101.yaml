apiVersion: presentations.haavard.dev/v1alpha1
kind: Presentation
metadata:
  name: kubernetes-operators-101
spec:
  theme:
    primaryColor: "#cdd6f4"
    secondaryColor: "#a6adc8"
    backgroundColor: "#1e1e2e"
    fontFamily: "Inter, sans-serif"
    logo: "https://companieslogo.com/img/orig/CRAYN.OL-12220c2f.png?t=1726036927"
  slides:
    - title: "Kubernetes Operators"
      subtitle: "Extending the platform"
      images:
        - url: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/Kubernetes_logo_without_workmark.svg/3840px-Kubernetes_logo_without_workmark.svg.png"
          alt: "Kubernetes logo"
    - title: "The Reconciliation Loop"
      bullets:
        - "Watch for changes to Presentation CRs"
        - "Generate Marp markdown from structured spec"
        - "Create ConfigMap, Deployment, Service, Gateway, HTTPRoute"
        - "Set ownerReferences for automatic cleanup"
      images:
        - url: "https://www.kubermatic.com/static/graphic_what-are-kubernetes-operators.png"
          alt: "Reconciliation loop diagram"
    - title: "Why Operators?"
      bullets:
        - "Encode domain knowledge as code"
        - "Self-healing infrastructure"
        - "Declarative API for complex workloads"
        - "GitOps-friendly lifecycle management"
